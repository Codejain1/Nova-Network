services:
  node:
    build: ../..
    container_name: nova-validator
    restart: unless-stopped
    environment:
      NODE_HOST: 0.0.0.0
      NODE_PORT: 8000
      DATA_DIR: /data
      PUBLIC_CONSENSUS: ${PUBLIC_CONSENSUS:-poa}
      PUBLIC_DIFFICULTY: ${PUBLIC_DIFFICULTY:-3}
      PUBLIC_REWARD: ${PUBLIC_REWARD:-25}
      PUBLIC_VALIDATORS: ${PUBLIC_VALIDATORS:-}
      PUBLIC_VALIDATOR_ROTATION: ${PUBLIC_VALIDATOR_ROTATION:-true}
      CHAIN_NAME: ${CHAIN_NAME:-Nova Network}
      TOKEN_NAME: ${TOKEN_NAME:-Nova}
      TOKEN_SYMBOL: ${TOKEN_SYMBOL:-NOVA}
      TOKEN_DECIMALS: ${TOKEN_DECIMALS:-18}
      CHAIN_ID: ${CHAIN_ID:-149}
      # Mining — each validator mines only on its rotation turn
      AUTO_MINE: "true"
      AUTO_MINE_MINER: ${AUTO_MINE_MINER}
      AUTO_MINE_INTERVAL: ${AUTO_MINE_INTERVAL:-5}
      AUTO_MINE_ALLOW_EMPTY: "true"
      # Sync — always pull from main node
      PEERS: ${MAIN_NODE_URL}
      PEER_SYNC_ENABLED: "true"
      PEER_SYNC_INTERVAL: ${PEER_SYNC_INTERVAL:-6}
      PEER_LAG_RESYNC_THRESHOLD: ${PEER_LAG_RESYNC_THRESHOLD:-3}
      # Mempool
      PUBLIC_MEMPOOL_TTL: ${PUBLIC_MEMPOOL_TTL:-900}
      PUBLIC_MEMPOOL_MAX_SIZE: ${PUBLIC_MEMPOOL_MAX_SIZE:-5000}
      # Security
      MAINNET_HARDENING: "true"
      STRICT_PUBLIC_SIGNATURES: "true"
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-300}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_REQUIRED: ${JWT_REQUIRED:-false}
      PEER_TOKEN: ${PEER_TOKEN:-}
    volumes:
      - nova_validator_data:/data
    ports:
      - "0.0.0.0:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 2g
    mem_reservation: 512m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  nova_validator_data:
    driver: local
