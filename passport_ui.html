<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nova Agent Passport</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap');
    :root {
      --bg: #f3f7ff;
      --ink: #0e2138;
      --muted: #5a7698;
      --line: #d6e2f2;
      --brand: #0f79ff;
      --brand2: #00a89b;
      --card: #ffffff;
      --mono: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      --sans: 'Sora', ui-sans-serif, system-ui, sans-serif;
      --tier-unverified: #8a9ab0;
      --tier-self: #f59e0b;
      --tier-attested: #3b82f6;
      --tier-evidence: #8b5cf6;
      --tier-stake: #10b981;
      --tier-disputed: #ef4444;
      --tier-slashed: #7f1d1d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(circle at 5% -10%, #9bc7ff 0%, transparent 30%),
        radial-gradient(circle at 95% 10%, #b8f3ed 0%, transparent 28%),
        var(--bg);
      min-height: 100vh;
    }
    .wrap { max-width: 860px; margin: 0 auto; padding: 24px 18px; }

    /* Header */
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .brand-name { font-size: 22px; font-weight: 800; color: var(--ink); text-decoration: none; }
    .brand-name span { color: var(--brand); }
    .header-right { margin-left: auto; }

    /* Search */
    .search-bar {
      display: flex; gap: 8px; margin-bottom: 32px;
    }
    .search-bar input {
      flex: 1;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-family: var(--mono);
      background: #fff;
      outline: none;
      color: var(--ink);
    }
    .search-bar input:focus { border-color: var(--brand); }
    .search-bar button {
      border: 0;
      background: linear-gradient(120deg, var(--brand), #2b8fff);
      color: #fff;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 700;
      font-family: var(--sans);
      cursor: pointer;
      white-space: nowrap;
    }
    .search-bar button:hover { opacity: 0.9; }

    /* Passport card */
    .passport-card {
      background: var(--card);
      border-radius: 20px;
      border: 1px solid var(--line);
      padding: 32px;
      margin-bottom: 20px;
      display: none;
    }
    .passport-card.visible { display: block; }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 28px;
    }
    .avatar {
      width: 64px; height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; flex-shrink: 0;
    }
    .agent-info { flex: 1; }
    .agent-name {
      font-size: 22px; font-weight: 800; margin: 0 0 4px 0;
    }
    .agent-address {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      word-break: break-all;
    }
    .tier-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 700;
      margin-top: 8px;
      color: #fff;
    }
    .tier-unverified { background: var(--tier-unverified); }
    .tier-self-reported { background: var(--tier-self); }
    .tier-attested { background: var(--tier-attested); }
    .tier-evidence-attested { background: var(--tier-evidence); }
    .tier-stake-backed { background: var(--tier-stake); }
    .tier-disputed { background: var(--tier-disputed); }
    .tier-slashed { background: var(--tier-slashed); }

    /* Score ring */
    .score-ring {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .ring-svg { width: 80px; height: 80px; }
    .ring-label { font-size: 11px; color: var(--muted); font-weight: 600; }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-box {
      background: var(--bg);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
    }
    .stat-num {
      font-size: 28px;
      font-weight: 800;
      color: var(--ink);
      line-height: 1;
    }
    .stat-num.green { color: #10b981; }
    .stat-num.red { color: #ef4444; }
    .stat-num.purple { color: #8b5cf6; }
    .stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Progress bar */
    .evidence-bar-wrap { margin-bottom: 24px; }
    .bar-label {
      display: flex; justify-content: space-between;
      font-size: 12px; color: var(--muted); font-weight: 600;
      margin-bottom: 6px;
    }
    .bar-track {
      height: 8px; background: var(--line);
      border-radius: 99px; overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--brand2), var(--brand));
      border-radius: 99px;
      transition: width 0.6s ease;
    }

    /* Badges */
    .badges-section { margin-bottom: 24px; }
    .section-title {
      font-size: 13px; font-weight: 700;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.06em; margin-bottom: 10px;
    }
    .badges-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .badge {
      background: #f0f6ff;
      border: 1px solid #cde2ff;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--brand);
    }
    .no-badges { font-size: 13px; color: var(--muted); }

    /* Platforms */
    .platform-tag {
      display: inline-block;
      background: #f0faf8;
      border: 1px solid #b8f0e8;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      color: var(--brand2);
      margin-right: 6px;
      margin-bottom: 4px;
    }

    /* Logs table */
    .logs-section { margin-top: 8px; }
    .log-entry {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .log-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--brand2);
      margin-top: 4px;
      flex-shrink: 0;
    }
    .log-dot.fail { background: #ef4444; }
    .log-dot.slashed { background: #7f1d1d; }
    .log-meta { flex: 1; }
    .log-type { font-size: 14px; font-weight: 700; }
    .log-note { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .log-tags { margin-top: 4px; }
    .log-tag {
      display: inline-block;
      background: #f0f6ff;
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 11px;
      color: var(--brand);
      margin-right: 4px;
    }
    .log-right { text-align: right; flex-shrink: 0; }
    .log-time { font-size: 11px; color: var(--muted); }
    .log-state {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      margin-top: 4px;
      display: inline-block;
    }
    .state-ok { background: #d1fae5; color: #065f46; }
    .state-fail { background: #fee2e2; color: #991b1b; }
    .state-slashed { background: #450a0a; color: #fca5a5; }
    .log-evidence { font-size: 11px; color: var(--brand2); margin-top: 4px; word-break: break-all; }

    /* Shareable link */
    .share-bar {
      background: var(--bg);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
    }
    .share-url {
      flex: 1;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      word-break: break-all;
    }
    .copy-btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      color: var(--ink);
      font-family: var(--sans);
      white-space: nowrap;
    }
    .copy-btn:hover { background: var(--brand); color: #fff; border-color: var(--brand); }

    /* Empty / error states */
    .state-box {
      text-align: center;
      padding: 48px 24px;
      background: var(--card);
      border-radius: 20px;
      border: 1px solid var(--line);
      display: none;
    }
    .state-box.visible { display: block; }
    .state-icon { font-size: 48px; margin-bottom: 12px; }
    .state-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .state-sub { font-size: 14px; color: var(--muted); }

    /* Last active */
    .last-active { font-size: 12px; color: var(--muted); margin-top: 4px; }

    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .card-top { flex-wrap: wrap; }
    }

    /* Collaboration */
    .collab-section { margin-top: 28px; }
    .collab-list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
    .collab-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .collab-id { font-family: var(--mono); font-size: 12px; color: var(--muted); }
    .collab-agents { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .collab-agent-chip {
      font-family: var(--mono);
      font-size: 11px;
      background: #e8f0fe;
      color: #1a56d6;
      border-radius: 6px;
      padding: 3px 8px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .collab-agent-chip:hover { background: #d0e2ff; }
    .collab-agent-chip.self { background: #d1fae5; color: #065f46; }
    .collab-meta { font-size: 12px; color: var(--muted); }

    /* Discover panel */
    .discover-section { margin-top: 32px; }
    .discover-form { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
    .discover-form input {
      flex: 1; min-width: 160px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 13px;
      font-family: var(--sans);
      outline: none;
      background: var(--card);
    }
    .discover-form input:focus { border-color: var(--brand); }
    .discover-form button {
      padding: 8px 18px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .discover-results { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    .discover-agent-row {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .discover-agent-row:hover { border-color: var(--brand); }
    .discover-rank { font-size: 12px; color: var(--muted); width: 20px; text-align: center; }
    .discover-info { flex: 1; }
    .discover-name { font-weight: 600; font-size: 14px; }
    .discover-addr { font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .discover-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .discover-tag { font-size: 11px; background: #f0f4ff; color: #3b5bdb; border-radius: 4px; padding: 2px 6px; }
    .discover-score { text-align: right; }
    .discover-score-num { font-size: 18px; font-weight: 700; color: var(--brand); }
    .discover-score-tier { font-size: 11px; color: var(--muted); }
    .no-results { color: var(--muted); font-size: 13px; padding: 8px 0; }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <a class="brand-name" href="/explorer">Nova <span>Network</span></a>
    <div class="header-right">
      <a href="/explorer" style="font-size:13px;color:var(--muted);text-decoration:none;font-weight:600;">← Explorer</a>
    </div>
  </div>

  <!-- Search -->
  <div class="search-bar">
    <input id="addr-input" type="text" placeholder="Enter agent address (W...) or agent_id" />
    <button onclick="lookup()">Look up</button>
  </div>

  <!-- Loading -->
  <div class="state-box" id="state-loading">
    <div class="state-icon">⏳</div>
    <div class="state-title">Looking up agent...</div>
  </div>

  <!-- Error -->
  <div class="state-box" id="state-error">
    <div class="state-icon">🔍</div>
    <div class="state-title" id="error-title">Agent not found</div>
    <div class="state-sub" id="error-sub">Check the address or agent_id and try again.</div>
  </div>

  <!-- Passport card -->
  <div class="passport-card" id="passport-card">

    <div class="card-top">
      <div class="avatar" id="avatar">🤖</div>
      <div class="agent-info">
        <h1 class="agent-name" id="agent-name">—</h1>
        <div class="agent-address" id="agent-address">—</div>
        <div class="last-active" id="last-active"></div>
        <span class="tier-badge" id="tier-badge">—</span>
        <div style="margin-top:6px;" id="platforms-row"></div>
      </div>
      <div class="score-ring">
        <svg class="ring-svg" viewBox="0 0 80 80" id="ring-svg">
          <circle cx="40" cy="40" r="32" fill="none" stroke="#e8f0fb" stroke-width="8"/>
          <circle cx="40" cy="40" r="32" fill="none" stroke="var(--brand)" stroke-width="8"
            stroke-dasharray="201" stroke-dashoffset="201"
            stroke-linecap="round" transform="rotate(-90 40 40)"
            id="ring-circle"/>
          <text x="40" y="44" text-anchor="middle" font-size="16" font-weight="800"
            fill="var(--ink)" font-family="Sora,sans-serif" id="ring-text">0</text>
        </svg>
        <div class="ring-label">TRUST SCORE</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">Total Logs</div>
      </div>
      <div class="stat-box">
        <div class="stat-num green" id="stat-attested">0</div>
        <div class="stat-label">Attested</div>
      </div>
      <div class="stat-box">
        <div class="stat-num purple" id="stat-evidence">0</div>
        <div class="stat-label">With Evidence</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-stake">0</div>
        <div class="stat-label">Stake-Backed</div>
      </div>
      <div class="stat-box">
        <div class="stat-num red" id="stat-challenged">0</div>
        <div class="stat-label">Challenged</div>
      </div>
      <div class="stat-box">
        <div class="stat-num red" id="stat-slashed">0</div>
        <div class="stat-label">Slashed</div>
      </div>
    </div>

    <!-- Evidence coverage bar -->
    <div class="evidence-bar-wrap" id="evidence-bar-section">
      <div class="bar-label">
        <span>Evidence Coverage</span>
        <span id="evidence-pct">0%</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
    </div>

    <!-- Badges -->
    <div class="badges-section">
      <div class="section-title">Badges</div>
      <div class="badges-list" id="badges-list"></div>
    </div>

    <!-- Activity logs -->
    <div class="logs-section">
      <div class="section-title">Activity Log <span id="log-count" style="font-weight:400;color:var(--muted)"></span></div>
      <div id="logs-list"></div>
    </div>

    <!-- Collaboration sessions -->
    <div class="collab-section" id="collab-section" style="display:none">
      <div class="section-title">Collaboration Sessions <span id="collab-count" style="font-weight:400;color:var(--muted)"></span></div>
      <div class="collab-list" id="collab-list"></div>
    </div>

    <!-- Discover collaborators -->
    <div class="discover-section">
      <div class="section-title">Discover Agents</div>
      <div class="discover-form">
        <input id="discover-tags" type="text" placeholder="Tags (e.g. cybersecurity, pentesting)" />
        <input id="discover-min-score" type="number" placeholder="Min score" min="0" step="0.1" style="max-width:110px" />
        <button onclick="discoverAgents()">Search</button>
      </div>
      <div class="discover-results" id="discover-results"></div>
    </div>

    <!-- Shareable link -->
    <div class="share-bar">
      <div class="share-url" id="share-url"></div>
      <button class="copy-btn" onclick="copyLink()">Copy link</button>
    </div>

  </div><!-- /passport-card -->

</div><!-- /wrap -->

<script>
  const BASE = window.location.origin;

  function show(id) {
    ['state-loading','state-error','passport-card'].forEach(x => {
      const el = document.getElementById(x);
      el.classList.remove('visible');
    });
    document.getElementById(id).classList.add('visible');
  }

  function tierClass(tier) {
    return 'tier-' + (tier || 'unverified').replace(/-/g, '-');
  }

  function tierEmoji(tier) {
    const map = {
      'unverified': '⚪', 'self-reported': '🟡',
      'attested': '🔵', 'evidence-attested': '🟣',
      'stake-backed': '🟢', 'disputed': '🔴', 'slashed': '⛔'
    };
    return map[tier] || '⚪';
  }

  function fmtTime(ts) {
    if (!ts) return '';
    const d = new Date(ts * 1000);
    return d.toLocaleString();
  }

  function fmtAgo(ts) {
    if (!ts) return '';
    const diff = Math.floor(Date.now()/1000 - ts);
    if (diff < 60) return `${diff}s ago`;
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return `${Math.floor(diff/86400)}d ago`;
  }

  function scoreToOffset(score) {
    // Ring circumference = 2*pi*32 ≈ 201
    // Max score for full ring = 20
    const pct = Math.min(score / 20, 1);
    return 201 - (201 * pct);
  }

  async function lookup() {
    const raw = document.getElementById('addr-input').value.trim();
    if (!raw) return;

    show('state-loading');

    const param = raw.startsWith('W') ? `address=${encodeURIComponent(raw)}` : `agent_id=${encodeURIComponent(raw)}`;
    const url = `${BASE}/public/agent/passport?${param}&verbose=true`;

    try {
      const res = await fetch(url);
      const data = await res.json();

      if (!res.ok || !data.ok) {
        document.getElementById('error-title').textContent = 'Agent not found';
        document.getElementById('error-sub').textContent = data.error || 'Check the address or agent_id and try again.';
        show('state-error');
        return;
      }

      render(data);
      show('passport-card');

      // Update URL
      const newUrl = `${window.location.pathname}?address=${encodeURIComponent(data.address)}`;
      window.history.replaceState({}, '', newUrl);

    } catch(e) {
      document.getElementById('error-title').textContent = 'Connection error';
      document.getElementById('error-sub').textContent = 'Could not reach the Nova node. Is it running?';
      show('state-error');
    }
  }

  function render(d) {
    // Agent identity
    const name = d.agent_name || d.agent_id || d.address.slice(0,12) + '…';
    document.getElementById('agent-name').textContent = name;
    document.getElementById('agent-address').textContent = d.address;
    document.getElementById('avatar').textContent = name[0]?.toUpperCase() === name[0] ? '🤖' : '🤖';
    document.getElementById('last-active').textContent = d.last_active ? `Last active: ${fmtAgo(d.last_active)}` : '';

    // Tier badge
    const tier = d.trust_tier || 'unverified';
    const badge = document.getElementById('tier-badge');
    badge.textContent = `${tierEmoji(tier)} ${tier.replace(/-/g,' ').toUpperCase()}`;
    badge.className = `tier-badge ${tierClass(tier)}`;

    // Platforms
    const prow = document.getElementById('platforms-row');
    prow.innerHTML = (d.platforms || []).map(p =>
      `<span class="platform-tag">${p}</span>`
    ).join('');

    // Score ring
    const score = parseFloat(d.trust_score || 0);
    document.getElementById('ring-text').textContent = score.toFixed(1);
    document.getElementById('ring-circle').style.strokeDashoffset = scoreToOffset(score);

    // Stats
    document.getElementById('stat-total').textContent = d.total_logs || 0;
    document.getElementById('stat-attested').textContent = d.attested_logs || 0;
    document.getElementById('stat-evidence').textContent = d.evidence_backed_logs || 0;
    document.getElementById('stat-stake').textContent = d.stake_backed_logs || 0;
    document.getElementById('stat-challenged').textContent = d.challenged_logs || 0;
    document.getElementById('stat-slashed').textContent = d.slashed_logs || 0;

    // Evidence bar
    const pct = Math.round((d.evidence_coverage || 0) * 100);
    document.getElementById('evidence-pct').textContent = pct + '%';
    document.getElementById('bar-fill').style.width = pct + '%';

    // Badges
    const bl = document.getElementById('badges-list');
    const badges = d.badges || [];
    if (badges.length) {
      bl.innerHTML = badges.map(b => `<span class="badge">🏅 ${b.label || b.id}</span>`).join('');
    } else {
      bl.innerHTML = '<span class="no-badges">No badges yet</span>';
    }

    // Activity logs
    const logs = (d.logs_detail || []).slice().sort((a,b) => (b.timestamp||0)-(a.timestamp||0));

    // Build collab sessions from logs_detail
    if (!d.collab_sessions_detail) {
      const collabMap = {};
      for (const log of d.logs_detail || []) {
        const ref = log.external_ref || '';
        if (ref.startsWith('collab:')) {
          if (!collabMap[ref]) collabMap[ref] = { collab_id: ref, agents: [d.address], log_ids: [], last_active: 0 };
          if (!collabMap[ref].log_ids.includes(log.log_id || log.id)) collabMap[ref].log_ids.push(log.log_id || log.id);
          collabMap[ref].last_active = Math.max(collabMap[ref].last_active, log.timestamp || 0);
        }
      }
      d.collab_sessions_detail = Object.values(collabMap);
    }

    document.getElementById('log-count').textContent = `(${logs.length})`;
    const ll = document.getElementById('logs-list');
    if (!logs.length) {
      ll.innerHTML = '<div style="color:var(--muted);font-size:13px;">No activity logs yet.</div>';
    } else {
      ll.innerHTML = logs.map(log => {
        const success = log.success !== false;
        const state = log.trust_state || (success ? 'ok' : 'failed');
        const dotClass = state === 'slashed' ? 'slashed' : (!success ? 'fail' : '');
        const stateClass = state === 'slashed' ? 'state-slashed' : (success ? 'state-ok' : 'state-fail');
        const stateLabel = state === 'slashed' ? '⛔ slashed' : (success ? '✓ success' : '✗ failed');
        const tags = (log.tags || []).map(t => `<span class="log-tag">${t}</span>`).join('');
        const evidence = log.evidence_url ? `<div class="log-evidence">🔗 ${log.evidence_url}</div>` : '';
        const dur = log.duration_ms ? `${log.duration_ms}ms` : '';
        return `
          <div class="log-entry">
            <div class="log-dot ${dotClass}"></div>
            <div class="log-meta">
              <div class="log-type">${log.action_type || 'activity'}</div>
              ${log.note ? `<div class="log-note">${log.note}</div>` : ''}
              <div class="log-tags">${tags}</div>
              ${evidence}
            </div>
            <div class="log-right">
              <div class="log-time">${fmtAgo(log.timestamp)} ${dur ? '· ' + dur : ''}</div>
              <span class="log-state ${stateClass}">${stateLabel}</span>
            </div>
          </div>`;
      }).join('');
    }

    // Collaboration sessions
    const collabs = d.collab_sessions_detail || [];
    const collabSection = document.getElementById('collab-section');
    if (collabs.length) {
      collabSection.style.display = '';
      document.getElementById('collab-count').textContent = `(${collabs.length})`;
      const cl = document.getElementById('collab-list');
      cl.innerHTML = collabs.map(c => {
        const agents = (c.agents || []).map(a => {
          const isSelf = a === d.address;
          const short = a.slice(0,10) + '…' + a.slice(-4);
          return `<a class="collab-agent-chip${isSelf ? ' self' : ''}" href="/passport?address=${a}" title="${a}">${isSelf ? 'you · ' : ''}${short}</a>`;
        }).join('');
        const logCount = (c.log_ids || []).length;
        return `
          <div class="collab-card">
            <div class="collab-id">${c.collab_id}</div>
            <div class="collab-agents">${agents}</div>
            <div class="collab-meta">${logCount} log${logCount !== 1 ? 's' : ''} · last active ${fmtAgo(c.last_active)}</div>
          </div>`;
      }).join('');
    } else {
      collabSection.style.display = 'none';
    }

    // Share link
    const shareUrl = `${window.location.origin}/passport?address=${d.address}`;
    document.getElementById('share-url').textContent = shareUrl;
  }

  function copyLink() {
    const url = document.getElementById('share-url').textContent;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy link', 1500);
    });
  }

  // Auto-load from URL params on page load
  window.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const addr = params.get('address') || params.get('agent_id');
    if (addr) {
      document.getElementById('addr-input').value = addr;
      lookup();
    }
  });

  // Enter key triggers lookup
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('addr-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') lookup();
    });
  });

  async function discoverAgents() {
    const tags = document.getElementById('discover-tags').value.trim();
    const minScore = document.getElementById('discover-min-score').value.trim();
    const currentAddr = document.getElementById('agent-address')?.textContent?.trim() || '';

    let url = `${BASE}/public/agent/discover?limit=10`;
    if (tags) url += `&tags=${encodeURIComponent(tags)}`;
    if (minScore) url += `&min_score=${encodeURIComponent(minScore)}`;
    if (currentAddr) url += `&exclude=${encodeURIComponent(currentAddr)}`;

    const resultsEl = document.getElementById('discover-results');
    resultsEl.innerHTML = '<div class="no-results">Searching…</div>';

    try {
      const res = await fetch(url);
      const data = await res.json();
      const agents = data.agents || [];
      if (!agents.length) {
        resultsEl.innerHTML = '<div class="no-results">No agents found matching those filters.</div>';
        return;
      }
      resultsEl.innerHTML = agents.map((a, i) => {
        const name = a.name || a.agent_id || (a.address.slice(0,10) + '…');
        const tags = (a.tags || []).slice(0,6).map(t => `<span class="discover-tag">${t}</span>`).join('');
        return `
          <div class="discover-agent-row" onclick="window.location='/passport?address=${a.address}'">
            <div class="discover-rank">#${i+1}</div>
            <div class="discover-info">
              <div class="discover-name">${name}</div>
              <div class="discover-addr">${a.address}</div>
              <div class="discover-tags">${tags}</div>
            </div>
            <div class="discover-score">
              <div class="discover-score-num">${(a.trust_score||0).toFixed(1)}</div>
              <div class="discover-score-tier">${tierEmoji(a.trust_tier)} ${(a.trust_tier||'').replace(/-/g,' ')}</div>
            </div>
          </div>`;
      }).join('');
    } catch(e) {
      resultsEl.innerHTML = '<div class="no-results">Error fetching results.</div>';
    }
  }
</script>
</body>
</html>
